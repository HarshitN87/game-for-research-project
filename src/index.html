<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#091120">
    <title>Signal Run — Merch Study</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap');
      :root { background:#091120; color:#eef7ff; font-family:'Space Grotesk',Arial,sans-serif; font-synthesis:none; }
      * { box-sizing:border-box; } body { margin:0; min-width:320px; overflow:hidden; background:#091120; } button,input,textarea { font:inherit; } button { cursor:pointer; }
      canvas { display:block; }
      #progress { position:fixed; z-index:30; bottom:0; left:0; width:0; height:4px; background:#63ecff; transition:width .25s; }
      #debug { display:none; }
      .study-overlay { position:fixed; z-index:20; inset:0; display:grid; place-items:center; overflow-y:auto; padding:34px 22px; background:radial-gradient(circle at 84% 12%,rgba(89,104,255,.23),transparent 31rem),radial-gradient(circle at 7% 86%,rgba(59,218,199,.13),transparent 28rem),#091120; transition:visibility .25s,opacity .25s; }
      .study-overlay:before { content:''; position:fixed; inset:0; pointer-events:none; opacity:.2; background-image:linear-gradient(rgba(102,177,214,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(102,177,214,.22) 1px,transparent 1px); background-size:52px 52px; mask-image:linear-gradient(to bottom,#000,transparent 82%); }
      .study-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
      .study-card { position:relative; width:min(100%,780px); margin:auto; padding:clamp(30px,5vw,62px); border:1px solid rgba(135,200,255,.2); border-radius:28px; background:linear-gradient(125deg,rgba(22,37,63,.95),rgba(11,20,37,.92)); box-shadow:0 28px 100px rgba(0,0,0,.37); }
      .study-brand { margin-bottom:42px; color:#f0f9ff; font-family:'DM Mono',monospace; font-size:.74rem; font-weight:500; letter-spacing:.16em; }.study-brand span { color:#63ecff; font-size:1.4em; }
      .eyebrow { display:block; margin-bottom:12px; color:#70e8f7; font-family:'DM Mono',monospace; font-size:.67rem; font-weight:500; letter-spacing:.15em; }
      h1,h2,p { margin-top:0; } h1 { margin-bottom:17px; color:#f8fcff; font-size:clamp(2.45rem,6vw,4.9rem); line-height:.95; letter-spacing:-.06em; } h2 { margin:0 0 7px; font-size:1.55rem; letter-spacing:-.045em; }
      .lead { max-width:650px; color:#b9cadc; font-size:1.05rem; line-height:1.62; }.lead strong { color:#fff; }.center { margin-inline:auto; text-align:center; }
      .meta-row { display:flex; flex-wrap:wrap; gap:10px; margin:27px 0; color:#88a3c2; font-family:'DM Mono',monospace; font-size:.71rem; }
      .consent-row { display:flex; gap:12px; align-items:flex-start; margin:28px 0 18px; color:#d4e2f1; font-size:.91rem; line-height:1.48; }.consent-row input { margin-top:3px; accent-color:#63ecff; }
      .primary-button,.secondary-button,.text-button { border:0; border-radius:12px; font-weight:700; transition:transform .18s,background .18s,opacity .18s; }.primary-button { padding:15px 20px; color:#07101c; background:linear-gradient(115deg,#63ecff,#a8efff); box-shadow:0 10px 28px rgba(99,236,255,.2); }.primary-button b { margin-left:18px; font-size:1.2em; }.primary-button:hover:not(:disabled) { transform:translateY(-2px); background:#d8fbff; }.primary-button:disabled { cursor:not-allowed; opacity:.35; }.secondary-button { display:block; width:100%; padding:13px; border:1px solid #6386ac; color:#e0efff; background:rgba(67,105,151,.25); }.text-button { display:block; width:100%; padding:13px; color:#9cbcdc; background:transparent; font-size:.83rem; }.fine-print { margin-top:23px; color:#7f99b6; font-size:.77rem; line-height:1.5; } code { color:#a7d7ff; }
      .route-chip { display:inline-block; margin-bottom:21px; padding:7px 11px; border-radius:999px; font-family:'DM Mono',monospace; font-size:.67rem; letter-spacing:.13em; }.route-chip.effort { border:1px solid rgba(93,235,208,.4); color:#a9f9ed; background:rgba(71,220,193,.1); }.route-chip.credit { border:1px solid rgba(190,130,255,.43); color:#dfc4ff; background:rgba(151,98,255,.11); }
      .shirt-showcase { display:flex; align-items:center; gap:30px; margin:31px 0; padding:20px; overflow:hidden; border:1px solid rgba(118,212,255,.2); border-radius:19px; background:radial-gradient(circle at 18% 48%,rgba(93,235,255,.18),transparent 13rem),#111f35; }.shirt-showcase.locked { filter:saturate(.74); }.shirt-stage { position:relative; width:260px; min-width:260px; height:310px; }.tee-shirt { position:absolute; z-index:2; top:25px; left:50px; width:160px; height:240px; overflow:hidden; border-radius:24px 24px 18px 18px; background:linear-gradient(135deg,#6cefff 0%,#3578d7 49%,#7e4fe4 100%); box-shadow:inset 10px 0 26px rgba(255,255,255,.16),inset -16px -13px 28px rgba(14,18,79,.32),0 24px 30px rgba(0,0,0,.26); }.tee-shirt:before,.tee-shirt:after { content:''; position:absolute; top:8px; z-index:-1; width:82px; height:98px; background:#4ca6e9; }.tee-shirt:before { left:-56px; transform:skewY(27deg); border-radius:24px 0 10px 22px; }.tee-shirt:after { right:-56px; transform:skewY(-27deg); border-radius:0 24px 22px 10px; background:#7a58db; }.tee-neck { position:absolute; top:-9px; left:50px; width:60px; height:35px; border:9px solid #081a36; border-radius:0 0 32px 32px; background:#bacddf; }.tee-logo { position:absolute; top:82px; width:100%; text-align:center; color:#faffff; font-family:'DM Mono',monospace; font-weight:500; line-height:.82; letter-spacing:.02em; text-shadow:0 2px 0 rgba(11,21,70,.45); }.tee-logo span { display:block; font-size:1.3rem; }.tee-logo strong { display:block; font-size:3.0rem; letter-spacing:-.12em; }.tee-logo small { display:block; margin-top:9px; color:#fff8bb; font-size:.6rem; letter-spacing:.19em; }.shirt-shadow { position:absolute; bottom:13px; left:25px; width:210px; height:30px; border-radius:50%; background:rgba(0,0,0,.42); filter:blur(10px); }.shirt-copy { min-width:0; }.shirt-copy .eyebrow { margin-bottom:9px; }.shirt-copy p { margin:0; color:#a8bdd2; font-size:.86rem; line-height:1.48; }.merch-status { display:inline-block; margin-top:14px; padding:7px 10px; border-radius:7px; color:#b8f6eb; background:rgba(78,229,203,.12); font-family:'DM Mono',monospace; font-size:.67rem; }.locked .merch-status { color:#c4d1e0; background:rgba(142,164,193,.12); }
      .success-mark { display:grid; place-items:center; width:55px; height:55px; margin:0 auto 24px; border:1px solid #65ecd5; border-radius:50%; color:#9cfff0; background:rgba(78,226,200,.1); font-size:1.45rem; font-weight:700; }.acquired .study-card,.finish .study-card,.round-clear .study-card,.complete .study-card { max-width:620px; text-align:center; }.acquired .shirt-showcase,.finish .shirt-showcase,.round-clear .shirt-showcase { text-align:left; }.final-score { display:inline-flex; flex-direction:column; gap:4px; margin:2px auto 26px; padding:10px 22px; border:1px solid rgba(132,180,231,.19); border-radius:11px; background:rgba(5,13,26,.37); }.final-score span { color:#91aac6; font-family:'DM Mono',monospace; font-size:.64rem; letter-spacing:.12em; }.final-score strong { font-size:1.4rem; }
      .brief-grid { display:grid; gap:12px; margin:28px 0; }.brief-grid div { display:flex; flex-wrap:wrap; align-items:center; gap:6px; color:#abc0d5; }.brief-grid span { margin-left:6px; }.brief-grid kbd { min-width:34px; padding:5px 8px; border:1px solid #55708d; border-bottom-width:3px; border-radius:6px; background:#172842; color:#f5fbff; font-family:'DM Mono',monospace; font-size:.69rem; text-align:center; }
      .study-hud { position:fixed; z-index:12; inset:0; pointer-events:none; }.study-hud.hidden { display:none; }.mission-card,.live-merch-card,.score-card,.play-tip { position:absolute; }.mission-card { top:28px; left:28px; display:flex; flex-direction:column; gap:3px; padding:14px 16px; border-left:2px solid #63ecff; background:linear-gradient(90deg,rgba(6,16,34,.78),transparent); }.mission-card .eyebrow { margin:0; font-size:.56rem; }.mission-card strong { font-size:.91rem; }.mission-card span:last-child { color:#abc1d5; font-size:.73rem; }.live-merch-card { top:29px; right:28px; width:220px; padding:16px; border:1px solid rgba(125,221,255,.25); border-radius:14px; background:rgba(7,15,31,.78); backdrop-filter:blur(9px); }.live-merch-card .eyebrow { margin-bottom:6px; font-size:.54rem; }.live-merch-card strong { display:block; margin-top:5px; font-size:.95rem; }.live-merch-card small { display:block; margin-top:2px; color:#9cefe7; font-size:.75rem; }.hud-shirt { position:relative; width:120px; height:114px; margin:auto; overflow:hidden; border-radius:14px 14px 10px 10px; background:linear-gradient(135deg,#62e9ff,#3d7bd7 52%,#8455e2); text-align:center; color:#fff; font-family:'DM Mono',monospace; line-height:.86; box-shadow:inset -10px -10px 16px rgba(23,15,87,.25); }.hud-shirt:before,.hud-shirt:after { content:''; position:absolute; top:4px; z-index:-1; width:52px; height:50px; background:#4ba9e7; }.hud-shirt:before { left:-30px; transform:skewY(27deg); }.hud-shirt:after { right:-30px; transform:skewY(-27deg); background:#7959dc; }.hud-shirt span { display:block; padding-top:36px; font-size:.95rem; }.hud-shirt strong { margin:0; font-size:1.85rem; letter-spacing:-.1em; }.score-card { right:33px; bottom:35px; text-align:right; }.score-card span { display:block; color:#8ca9c8; font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.14em; }.score-card strong { color:#fff; font-size:2.15rem; letter-spacing:-.06em; }.play-tip { bottom:38px; left:50%; color:rgba(221,240,255,.78); font-family:'DM Mono',monospace; font-size:.61rem; letter-spacing:.04em; transform:translateX(-50%); white-space:nowrap; }
      #game_hud { position:fixed; z-index:10; inset:0; visibility:hidden; pointer-events:none; } #crosshair { position:absolute; top:50%; left:50%; width:28px; transform:translate(-50%,-50%); filter:drop-shadow(0 0 4px #64ecff); } #ammo_container { position:absolute; right:30px; bottom:99px; color:#dff8ff; font-family:'DM Mono',monospace; font-size:1.45rem; text-shadow:0 2px 12px #000; } #health_container { position:absolute; bottom:32px; left:30px; width:176px; height:9px; border:1px solid rgba(226,248,255,.85); background:rgba(7,17,32,.6); } #health_progress { width:100%; height:100%; background:linear-gradient(90deg,#5cf1d1,#76c7ff); transition:width .15s; }
      .survey .study-card { max-width:810px; }.survey h1 { font-size:clamp(2.35rem,5vw,3.75rem); }.question { margin:30px 0; padding:0; border:0; }.question legend,.question>span { display:block; margin-bottom:12px; color:#edf6fd; font-weight:600; line-height:1.45; }.likert { display:grid; grid-template-columns:1fr repeat(7,32px) 1fr; align-items:center; gap:7px; }.likert>span { color:#91a8c1; font-size:.66rem; line-height:1.25; }.likert>span:last-child { text-align:right; }.likert label { display:grid; place-items:center; width:32px; height:34px; border:1px solid rgba(138,174,211,.36); border-radius:6px; background:#14243d; cursor:pointer; }.likert input { position:absolute; opacity:0; }.likert b { color:#bdd0e3; font-family:'DM Mono',monospace; font-size:.7rem; font-weight:400; }.likert label:has(input:checked) { border-color:#63ecff; background:rgba(99,236,255,.17); box-shadow:0 0 12px rgba(99,236,255,.18); }.likert label:has(input:checked) b { color:#fff; }.radio-row { display:block; margin:9px 0; color:#bfcede; font-size:.9rem; }.radio-row input { margin-right:8px; accent-color:#63ecff; }.question textarea { display:block; width:100%; margin-top:8px; padding:12px; border:1px solid rgba(133,169,207,.38); border-radius:10px; outline:0; resize:vertical; color:#ebf5ff; background:#101f35; }.question textarea:focus { border-color:#63ecff; }
      .loadout-customizer { margin:20px 0; padding:18px; border:1px solid rgba(99,236,255,.2); border-radius:14px; background:rgba(14,28,49,.6); text-align:left; }.customizer-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:10px; }.customizer-item { display:flex; flex-direction:column; gap:6px; }.item-label { color:#8faed1; font-family:'DM Mono',monospace; font-size:0.65rem; text-transform:uppercase; }.customizer-item select { padding:8px 10px; border:1px solid #4a6889; border-radius:8px; color:#fff; background:#0c182a; outline:none; font-size:0.82rem; cursor:pointer; }.customizer-item select:disabled { opacity:0.55; cursor:not-allowed; }.customizer-lock-hint { margin-top:12px; color:#ffbc63; font-size:0.72rem; }
      .hud-shirt.default { background:linear-gradient(135deg,#7f8c8d,#95a5a6 52%,#7f8c8d); box-shadow:inset -10px -10px 16px rgba(0,0,0,.2); }
      @media(max-width:700px) { .study-overlay { padding:18px; }.study-card { padding:30px 24px; border-radius:21px; }.study-brand { margin-bottom:28px; }.shirt-showcase { gap:8px; padding:12px; }.shirt-stage { width:128px; min-width:128px; height:170px; transform:scale(.75); transform-origin:center; margin:-23px -9px; }.shirt-copy h2 { font-size:1.08rem; }.shirt-copy p { font-size:.74rem; }.mission-card { top:14px; left:15px; }.live-merch-card { top:auto; right:14px; bottom:83px; width:130px; padding:9px; }.live-merch-card strong { font-size:.63rem; }.live-merch-card small { font-size:.55rem; }.hud-shirt { transform:scale(.82); margin:-7px auto -5px; }.score-card { right:17px; bottom:25px; }.play-tip { left:17px; bottom:29px; transform:none; font-size:.5rem; }.likert { grid-template-columns:repeat(7,1fr); gap:5px; }.likert>span { display:none; }.likert label { width:100%; }.survey .study-card { padding:30px 20px; } #ammo_container { right:17px; bottom:82px; font-size:1rem; } #health_container { bottom:21px; left:17px; width:125px; } }
    </style>
  </head>
  <body>
    <div id="study_overlay" class="study-overlay"><div class="study-card"><div class="study-brand"><span>✦</span> SIGNAL RUN</div><span class="eyebrow">LOADING ARENA</span><h1>Preparing the run.</h1><p class="lead">Loading the FPS arena and your shirt merch preview.</p></div></div>
    <div id="study_hud" class="study-hud hidden"></div>
    <div id="game_hud"><img id="crosshair" src="<%=require('./ui/crosshair.png')%>" alt=""><div id="ammo_container"><span id="current_ammo">0</span><span> | </span><span id="max_ammo">0</span></div><div id="health_container"><div id="health_progress"></div></div></div>
    <div id="progress"></div>
    <div id="debug"></div>
  </body>
</html>
